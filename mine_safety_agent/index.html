<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧矿山大屏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e0e8f0;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- header ---- */
  .header {
    height: 64px;
    background: linear-gradient(180deg, #0d1320 0%, #0a0e17 100%);
    border-bottom: 1px solid #1a2740;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .conn-indicator {
    position: absolute;
    right: 32px;
    font-size: 13px;
    color: #5a7a9a;
  }
  .conn-indicator .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: #e74c3c;
    box-shadow: 0 0 6px #e74c3c;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .conn-indicator .dot.on {
    background: #00e676;
    box-shadow: 0 0 8px #00e676;
  }

  /* ---- main grid ---- */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    padding: 16px;
  }

  /* ---- card ---- */
  .card {
    background: #111827;
    border: 1px solid #1e2d45;
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: #8ea4c5;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e2d45;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 18px;
    background: #4facfe;
    border-radius: 2px;
  }

  /* ---- belt card spans 2 cols ---- */
  .belt-card { grid-column: 1 / -1; }

  /* ---- metric row ---- */
  .metrics {
    display: flex;
    gap: 24px;
    flex: 1;
  }
  .metric {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #0f1625;
    border-radius: 6px;
    padding: 16px;
  }
  .metric-label {
    font-size: 13px;
    color: #5a7a9a;
    margin-bottom: 8px;
  }
  .metric-value {
    font-size: 42px;
    font-weight: 700;
    font-family: "Consolas", "Courier New", monospace;
    color: #4facfe;
    transition: color 0.5s;
  }
  .metric-value.warn { color: #f39c12; }
  .metric-value.danger { color: #e74c3c; }
  .metric-unit {
    font-size: 14px;
    color: #4a6a8a;
    margin-top: 4px;
  }

  /* ---- status badge ---- */
  .status-badge {
    font-size: 36px;
    font-weight: 700;
    padding: 8px 28px;
    border-radius: 6px;
    color: #fff;
  }
  .status-badge.running  { background: #00b44e; box-shadow: 0 0 20px rgba(0,180,78,0.4); }
  .status-badge.standby  { background: #f39c12; box-shadow: 0 0 20px rgba(243,156,18,0.4); }
  .status-badge.fault    { background: #e74c3c; box-shadow: 0 0 20px rgba(231,76,60,0.5); animation: blink 0.8s infinite; }

  @keyframes blink {
    50% { opacity: 0.5; }
  }

  /* ---- footer ---- */
  .footer {
    height: 32px;
    font-size: 12px;
    color: #314560;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #1a2740;
  }
</style>
</head>
<body>

<div class="header">
  <h1>智慧矿山 · 综合监控大屏</h1>
  <div class="conn-indicator">
    <span id="dot" class="dot"></span><span id="conn-text">未连接</span>
  </div>
</div>

<div class="main">
  <!-- 主皮带机 -->
  <div class="card belt-card">
    <div class="card-title">主皮带机</div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">轴承温度</span>
        <span class="metric-value" id="belt-temp">--</span>
        <span class="metric-unit">°C</span>
      </div>
      <div class="metric">
        <span class="metric-label">电机电流</span>
        <span class="metric-value" id="belt-current">--</span>
        <span class="metric-unit">A</span>
      </div>
      <div class="metric">
        <span class="metric-label">震动频率</span>
        <span class="metric-value" id="belt-vibration">--</span>
        <span class="metric-unit">mm/s</span>
      </div>
    </div>
  </div>

  <!-- 采煤机 -->
  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-title">采煤机</div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">运行状态</span>
        <span class="status-badge" id="shearer-status">--</span>
      </div>
      <div class="metric">
        <span class="metric-label">工作电压</span>
        <span class="metric-value" id="shearer-voltage">--</span>
        <span class="metric-unit">V</span>
      </div>
    </div>
  </div>
</div>

<div class="footer">实时数据刷新 · WebSocket 连接</div>

<script>
const WS_URL = `ws://${location.hostname}:8000/ws`;

const dot   = document.getElementById('dot');
const cText = document.getElementById('conn-text');

function setConnected(ok) {
  dot.className   = ok ? 'dot on' : 'dot';
  cText.textContent = ok ? '已连接' : '未连接';
}

let ws = null;
let reconnectTimer = null;

function connect() {
  if (ws && ws.readyState !== WebSocket.CLOSED) return;
  setConnected(false);

  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    setConnected(true);
    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    updateUI(d);
  };
  ws.onclose = () => {
    setConnected(false);
    if (!reconnectTimer) reconnectTimer = setInterval(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

// --- UI update ---

const elTemp   = document.getElementById('belt-temp');
const elCurr   = document.getElementById('belt-current');
const elVib    = document.getElementById('belt-vibration');
const elStatus = document.getElementById('shearer-status');
const elVolt   = document.getElementById('shearer-voltage');

function updateUI(d) {
  // 皮带机
  elTemp.textContent = d.belt.temperature;
  elCurr.textContent = d.belt.current;
  elVib.textContent  = d.belt.vibration;

  // 颜色警示
  colorBy(elTemp,  d.belt.temperature, 55, 75);
  colorBy(elCurr,  d.belt.current,      135, 165);
  colorBy(elVib,   d.belt.vibration,    2.0, 3.5);

  // 采煤机
  const st = d.shearer.status;
  elStatus.textContent = st;
  elStatus.className = 'status-badge ' +
    (st === '运行' ? 'running' : st === '待机' ? 'standby' : 'fault');

  elVolt.textContent = d.shearer.voltage;
  colorBy(elVolt, d.shearer.voltage, 3200, 3400);
}

function colorBy(el, v, lowWarn, highWarn) {
  el.classList.remove('warn', 'danger');
  if (v > highWarn) el.classList.add('danger');
  else if (v < lowWarn || v > (highWarn - (highWarn - lowWarn) * 0.3)) el.classList.add('warn');
}

connect();
</script>
</body>
</html>
